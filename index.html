<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>دعوة زفاف ثلاثية الأبعاد</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    overflow: hidden;
    font-family: 'Tahoma', 'Segoe UI', system-ui, -apple-system, 'Amiri', serif;
    height: 100vh;
    width: 100%;
    background: radial-gradient(circle at center, #1a0a2a, #0d0221);
    position: relative;
  }

  /* Canvas 3D الخلفية */
  #bg-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
    pointer-events: none;
  }

  /* شاشة البداية مع تأثير ضبابي */
  .start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    z-index: 200;
    transition: opacity 1s ease;
  }

  .start-btn {
    padding: 18px 44px;
    font-size: 26px;
    font-weight: bold;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    color: #fff3e0;
    background: linear-gradient(135deg, #ff4d6d, #ffb347, #ffd966);
    box-shadow: 0 0 20px rgba(255, 100, 100, 0.8), 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: inherit;
    letter-spacing: 2px;
  }

  .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 35px rgba(255, 200, 100, 0.9);
  }

  /* بطاقة الدعوة بتأثير زجاجي وثلاثي الأبعاد */
  .card {
    position: relative;
    z-index: 20;
    width: 90%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.97);
    border-radius: 48px;
    overflow: hidden;
    text-align: center;
    border: 3px solid rgba(255, 215, 0, 0.8);
    box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(255, 200, 100, 0.3);
    opacity: 0;
    transform: scale(0.7) rotateY(-15deg);
    transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    backdrop-filter: blur(2px);
  }

  .card.show {
    opacity: 1;
    transform: scale(1) rotateY(0deg);
  }

  .card img {
    width: 100%;
    display: block;
    pointer-events: none;
  }

  /* تصميم متجاوب */
  @media (max-width: 550px) {
    .card { max-width: 92%; }
    .start-btn { font-size: 22px; padding: 14px 36px; }
  }

  /* رسوم متحركة للقصاصات والورود والقلوب (fallbacks) لكن معظم التأثيرات ثلاثية الأبعاد عبر canvas */
  .hide {
    display: none;
  }

  /* تأثيرات جانبية للأزرار */
  button {
    font-family: inherit;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="start-screen" id="startScreen">
  <button class="start-btn" onclick="startWedding()">✨ افتح الدعوة ✨</button>
</div>

<div class="card" id="card">
  <img src="invite.png" alt="دعوة زفاف" onerror="this.src='https://placehold.co/600x800/fff8e7/d4af37?text=دعوة+زفاف+سعيدة';">
</div>

<audio id="weddingAudio" loop preload="auto">
  <source src="wedding.mp3" type="audio/mpeg">
  <!-- ملف تجريبي إذا لم يوجد الصوت -->
</audio>

<script>
  (function() {
    // ------------------- 3D مشهد انفجارات مع قصاصات وردية وقلوب -------------------
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let explosions = [];     // لكل انفجار جزيئات خاصة به
    let animationId = null;
    let sceneActive = false; // تصبح true بعد الضغط على زر البدء
    
    // ألوان زاهية تشبه القصاصات والورود والقلوب
    const colorPalette = [
      '#FFB7B2', '#FFD966', '#FF6B6B', '#E84393', '#F9C74F', '#90BE6D', '#F94144',
      '#F9844A', '#F8961E', '#577590', '#9C89B8', '#FFC8DD', '#B8F2E6', '#FF99C8',
      '#FCF6BD', '#D0F4DE', '#A9DEF9'
    ];
    
    // قلوب ورموز ورد (لتظهر كأيقونات صغيرة)
    const heartSymbol = '❤️';
    const roseSymbol = '🌹';
    const flowerSymbol = '🌸';
    const confettiSymbols = ['⭐', '✨', '💖', '💗', '🌺', '🌼', '🌸', '❤️', '💐'];
    
    class Particle3D {
      constructor(x, y, vx, vy, type = 'confetti') {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.size = Math.random() * 9 + 5;   // 5~14px
        this.alpha = 1;
        this.life = 1;
        this.decay = 0.018 + Math.random() * 0.02;
        this.type = type;  // 'confetti', 'heart', 'flower'
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.2;
        // اختيار شكل أو لون مميز
        if (type === 'heart') {
          this.symbol = heartSymbol;
          this.color = '#ff4d6d';
        } else if (type === 'flower') {
          this.symbol = [roseSymbol, flowerSymbol, '🌻', '🌷'][Math.floor(Math.random() * 4)];
          this.color = '#ffb347';
        } else {
          // قصاصة عادية
          this.symbol = null;
          this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
        }
        this.gravity = 0.15;
        this.drag = 0.99;
      }
      
      update() {
        this.vx *= this.drag;
        this.vy += this.gravity;
        this.vx += (Math.random() - 0.5) * 0.2; // رياح خفيفة
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.alpha = this.life;
        this.rotation += this.rotSpeed;
        return this.life > 0.02 && this.y < height + 200 && this.x > -200 && this.x < width + 200;
      }
      
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha * 0.9;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        if (this.type === 'heart') {
          ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", system-ui, sans-serif`;
          ctx.fillStyle = this.color;
          ctx.shadowBlur = 6;
          ctx.shadowColor = "rgba(255,80,120,0.8)";
          ctx.fillText(heartSymbol, -this.size/2, this.size/2);
        } else if (this.type === 'flower') {
          ctx.font = `${this.size+2}px "Segoe UI Emoji", "Apple Color Emoji"`;
          ctx.fillStyle = '#ffa07a';
          ctx.shadowBlur = 5;
          ctx.fillText(this.symbol, -this.size/2, this.size/2);
        } else {
          // قصاصات ورقية: مستطيلات دوارة
          ctx.fillStyle = this.color;
          ctx.shadowBlur = 3;
          ctx.shadowColor = "rgba(0,0,0,0.2)";
          ctx.fillRect(-this.size/2, -this.size/3, this.size, this.size * 0.6);
          // خط زخرفي
          ctx.fillStyle = "rgba(255,215,0,0.7)";
          ctx.fillRect(-this.size/2 + 2, -this.size/6, this.size-4, 2);
        }
        ctx.restore();
      }
    }
    
    // انفجار ثلاثي الأبعاد: يولد دفعة كبيرة من الجسيمات (ورود، قلوب، قصاصات)
    function createExplosion(centerX, centerY, intensity = 1.2) {
      const particleCount = Math.floor(45 * intensity + 15); // 45~70 جسيم
      for (let i = 0; i < particleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 9 * intensity;
        const vx = Math.cos(angle) * speed * (Math.random() * 1.2);
        const vy = Math.sin(angle) * speed * (Math.random() * 1.2);
        
        let type = 'confetti';
        const randType = Math.random();
        if (randType < 0.3) type = 'heart';      // 30% قلوب
        else if (randType < 0.55) type = 'flower'; // 25% ورد وزهـور
        else type = 'confetti';                   // 45% قصاصات ورقية
        
        const p = new Particle3D(centerX, centerY, vx, vy, type);
        // جعل الجاذبية أخف للورود لتبدو ساحرة
        if (type === 'flower') p.gravity = 0.08;
        if (type === 'heart') p.gravity = 0.12;
        particles.push(p);
      }
    }
    
    // انفجار عشوائي في الخلفية (مشهد 3d)
    function randomBackgroundExplosion() {
      if (!sceneActive) return;
      const randX = Math.random() * width;
      const randY = Math.random() * height * 0.7 + height * 0.15;
      const intens = 0.7 + Math.random() * 1.0;
      createExplosion(randX, randY, intens);
    }
    
    // انفجارات متتالية ومستمرة لإحساس مهرجان 3d
    let explosionInterval = null;
    let continuousExplosion = null;
    
    function startBackgroundFireworks() {
      if (explosionInterval) clearInterval(explosionInterval);
      // إنفجار كل 1.2 ثانية إلى 2.2 ثانية بشكل ديناميكي
      explosionInterval = setInterval(() => {
        if (sceneActive) {
          // انفجارات متعددة في مواقع مختلفة أحياناً
          const countExpl = Math.random() > 0.6 ? 2 : 1;
          for (let i=0; i<countExpl; i++) {
            const randX = 50 + Math.random() * (width - 100);
            const randY = 60 + Math.random() * (height - 100);
            const strength = 0.8 + Math.random() * 1.2;
            createExplosion(randX, randY, strength);
          }
        }
      }, 1300);
      
      // موجة ثانية: ومضات إضافية تشبه الألعاب النارية السريعة
      continuousExplosion = setInterval(() => {
        if (!sceneActive) return;
        if (Math.random() > 0.65) {
          const x = Math.random() * width;
          const y = Math.random() * height * 0.8 + 50;
          createExplosion(x, y, 0.6);
        }
      }, 450);
    }
    
    function stopBackgroundExplosions() {
      if (explosionInterval) clearInterval(explosionInterval);
      if (continuousExplosion) clearInterval(continuousExplosion);
      explosionInterval = null;
      continuousExplosion = null;
    }
    
    // إدارة الجسيمات وتحديثها ورسمها
    function updateParticles() {
      for (let i = particles.length-1; i >= 0; i--) {
        const alive = particles[i].update();
        if (!alive) {
          particles.splice(i,1);
        }
      }
    }
    
    function drawParticles() {
      for (let p of particles) {
        p.draw(ctx);
      }
    }
    
    // رسم خلفية متدرجة ونقاط ضوئية لتعميق الشعور 3D
    function drawBackgroundGradient() {
      const grad = ctx.createLinearGradient(0, 0, width*0.3, height);
      grad.addColorStop(0, '#160b2e');
      grad.addColorStop(0.5, '#2a1e44');
      grad.addColorStop(1, '#0e0820');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
      
      // نجوم صغيرة متحركة تُحاكي العمق
      for (let i=0; i<200; i++) {
        if (window.starCache) {
          const s = window.starCache[i];
          ctx.fillStyle = `rgba(255,220,150,${0.3+Math.sin(Date.now()*0.001 + i)*0.2})`;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }
    
    function initStars() {
      window.starCache = [];
      for (let i=0;i<250;i++) {
        window.starCache.push({
          x: Math.random() * 2000,
          y: Math.random() * 1500,
          r: Math.random() * 2 + 1
        });
      }
    }
    
    function animateScene() {
      if (!width || !height) return;
      ctx.clearRect(0, 0, width, height);
      drawBackgroundGradient();
      updateParticles();
      drawParticles();
      requestAnimationFrame(animateScene);
    }
    
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      if (window.starCache) {
        // إعادة توزيع النجوم للشاشة الجديدة
        for (let s of window.starCache) {
          s.x = Math.random() * width;
          s.y = Math.random() * height;
        }
      }
    }
    
    // بدء جميع المؤثرات البصرية وفتح الدعوة
    window.startWedding = function() {
      if (started) return;
      started = true;
      
      // إخفاء شاشة البداية
      const startDiv = document.getElementById('startScreen');
      startDiv.style.opacity = '0';
      setTimeout(() => {
        startDiv.style.display = 'none';
      }, 800);
      
      // تشغيل الموسيقى (محاولة تلقائية بعد تفاعل المستخدم)
      const audio = document.getElementById('weddingAudio');
      audio.volume = 0.55;
      audio.play().catch(e => console.log("الصوت يحتاج تفاعل, لكنه سيعمل بعد النقر"));
      
      // إظهار البطاقة
      const card = document.getElementById('card');
      card.classList.add('show');
      
      // تفعيل المشهد ثلاثي الأبعاد والانفجارات
      sceneActive = true;
      
      // توليد انفجار احتفالي فوري حول البطاقة
      setTimeout(() => {
        if (sceneActive) {
          // انفجار مكثف في وسط الشاشة
          createExplosion(width/2, height/2 + 30, 1.5);
          // انفجارات جانبية تحاكي الألعاب النارية
          for (let i=0; i<3; i++) {
            setTimeout(() => {
              if(sceneActive) createExplosion(width * 0.2 + Math.random() * width*0.6, height*0.3, 1.2);
            }, i*160);
          }
          // انفجار على البطاقة نفسها (أعلى)
          setTimeout(() => {
            if(sceneActive) createExplosion(width/2, height*0.25, 1.3);
          }, 400);
        }
      }, 100);
      
      // تفعيل الانفجارات الدورية في الخلفية وكأنها مشهد 3D متواصل
      startBackgroundFireworks();
      
      // انفجار إضافي كل 4 ثوانٍ ينفجر قرب زوايا مختلفة
      let extraFire = setInterval(() => {
        if (sceneActive) {
          const randX = Math.random() * width;
          const randY = Math.random() * height;
          createExplosion(randX, randY, 0.9);
          if (Math.random() > 0.7) {
            createExplosion(width - randX * 0.5, randY + 20, 0.8);
          }
        } else {
          clearInterval(extraFire);
        }
      }, 2100);
      
      // حفظ معرف لوقف الانفجارات عند الحاجة
      window._extraInterval = extraFire;
    };
    
    // تحميل كل شيء
    function init() {
      initStars();
      resizeCanvas();
      window.addEventListener('resize', () => {
        resizeCanvas();
      });
      animateScene();
      
      // جعل بداية هادئة لكن بإمكاننا إضافة جسيمات صغيرة متحركة وردية خلفية قبل البدء؟
      // قبل البدء نعرض تأثيرات خفيفة جداً (حتى يكون الجو احتفالي)
      setTimeout(() => {
        if (!started) {
          // بعض الجسيمات العائمة الهادئة لإغراء الزائر
          for(let i=0;i<18;i++) {
            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;
            let vx = (Math.random() - 0.5)*0.6;
            let vy = (Math.random() - 0.8)*0.8;
            let typeR = Math.random() > 0.6 ? 'heart' : 'flower';
            let p = new Particle3D(x, y, vx, vy, typeR);
            p.gravity = 0.03;
            p.decay = 0.008;
            p.life = 0.9;
            particles.push(p);
          }
        }
      }, 500);
    }
    
    let started = false;
    init();
  })();
</script>
</body>
</html>
