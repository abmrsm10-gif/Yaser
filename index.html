<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
font-family:Tahoma;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6f6,#e0c3fc,#c2e9fb);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.start-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.3);
z-index:100;
}

.start-btn{
padding:18px 40px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff66c4,#ffd700);
}

.card{
width:90%;
max-width:430px;
background:white;
border-radius:30px;
overflow:hidden;
text-align:center;
border:5px solid gold;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
opacity:0;
transform:scale(.8);
transition:1s;
}

.card.show{
opacity:1;
transform:scale(1);
}

.card img{
width:100%;
display:block;
}

/* قصاصات */
.confetti{
position:absolute;
width:8px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(720deg);
opacity:0;
}
}

/* انفجار */
.firework{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
animation:boom 1s ease-out forwards;
}

@keyframes boom{
from{transform:scale(1);opacity:1;}
to{transform:scale(25);opacity:0;}
}

</style>
</head>

<body>

<div class="start-screen" id="startScreen">
<button class="start-btn" onclick="start()">🎉 فتح الدعوة</button>
</div>

<audio id="music" loop>
<source src="wedding.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">
<img src="invite.png">
</div>

<script>

let started=false;

function start(){

if(started) return;
started=true;

document.getElementById("startScreen").style.display="none";
document.getElementById("card").classList.add("show");

const music=document.getElementById("music");
music.play().catch(()=>{});

/* مؤثرات */
setInterval(confetti,70);
setInterval(firework,1200);

}

/* قصاصات */
function confetti(){

const c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*window.innerWidth+"px";
c.style.background=["#ff66c4","#ffd700","#fff","#00e5ff"][Math.floor(Math.random()*4)];
c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),6000);

}

/* انفجارات حقيقية */
function firework(){

const x=Math.random()*window.innerWidth;
const y=Math.random()*window.innerHeight*0.6;

for(let i=0;i<30;i++){

const f=document.createElement("div");
f.className="firework";

const angle=Math.random()*2*Math.PI;
const radius=Math.random()*100;

f.style.left=(x+Math.cos(angle)*radius)+"px";
f.style.top=(y+Math.sin(angle)*radius)+"px";

f.style.background=["#ff0000","#ffd700","#fff","#00ffff"][Math.floor(Math.random()*4)];

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

</script>

</body>
</html>
