<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دعوة زفاف</title>
  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(to bottom, #fffdf8, #f7f1e3);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }.card {
  background: white;
  width: 100%;
  max-width: 500px;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 10px 35px rgba(0,0,0,0.15);
  text-align: center;
  border: 4px solid #d4af37;
}

.card img {
  width: 100%;
  display: block;
}

.footer {
  padding: 20px;
  background: #fffaf0;
}

.footer h2 {
  color: #b8860b;
  margin-bottom: 10px;
}

.footer p {
  margin: 8px 0;
  color: #444;
  font-size: 18px;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  background: #d4af37;
  color: white;
  text-decoration: none;
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 18px;
  transition: 0.3s;
}

.btn:hover {
  background: #b8860b;
}

  </style>
</head>
<body>
  <div class="card">
    <img src="YOUR_IMAGE_HERE.jpg" alt="دعوة زفاف" /><div class="footer">
  <h2>دعوة زفاف</h2>
  <p>يسرنا دعوتكم لحضور حفل الزفاف</p>
  <p>📅 7 حزيران 2026</p>
  <p>🕖 الساعة 7 مساءً</p>
  <p>📍 صالة اشنا - مقابل شارع عثمان</p>

  <a class="btn" href="https://maps.google.com" target="_blank">
    عرض الموقع
  </a>
</div>

  </div>
</body>
</html>
