<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
font-family:Tahoma;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6f6,#e0c3fc,#c2e9fb);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* زر البداية */
.start-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.3);
z-index:100;
}

.start-btn{
padding:18px 40px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff66c4,#ffd700);
}

/* الكتاب */
.book{
width:320px;
height:420px;
position:relative;
perspective:1500px;
}

/* الغلاف */
.cover{
width:100%;
height:100%;
position:absolute;
transform-origin:left;
transition:1.2s ease;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
z-index:3;
}

.cover img{
width:100%;
height:100%;
object-fit:cover;
}

/* فتح الكتاب */
.book.open .cover{
transform:rotateY(-140deg);
}

/* داخل الكتاب */
.inside{
position:absolute;
width:100%;
height:100%;
background:#fff;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:15px;
opacity:0;
transform:scale(.9);
transition:1s;
z-index:1;
}

/* عند الفتح يظهر الداخل */
.book.open .inside{
opacity:1;
transform:scale(1);
}

/* الصورة داخل الكتاب */
.inside img{
width:100%;
max-height:260px;
object-fit:contain;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
margin-bottom:10px;
}

/* نص */
.inside h1{
color:#b8860b;
margin:10px 0;
}

.inside p{
font-size:18px;
color:#444;
margin:5px 0;
}

/* قصاصات */
.confetti{
position:absolute;
width:8px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(720deg);
opacity:0;
}
}

/* انفجار */
.firework{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
animation:boom 1s ease-out forwards;
}

@keyframes boom{
from{transform:scale(1);opacity:1;}
to{transform:scale(25);opacity:0;}
}

</style>
</head>

<body>

<div class="start-screen" id="startScreen">
<button class="start-btn" onclick="start()">🎉 فتح الدعوة</button>
</div>

<audio id="music" loop>
<source src="wedding.mp3" type="audio/mpeg">
</audio>

<!-- الكتاب -->
<div class="book" id="book">

<div class="cover">
<img src="invite.png">
</div>

<!-- الصورة أصبحت داخل الكتاب -->
<div class="inside">

<img src="invite.png">

<h1>دعوة زفاف</h1>
<p>يسرنا حضوركم لحفل الزفاف</p>
<p>📅 7 حزيران 2026</p>
<p>🕖 الساعة 7 مساءً</p>

</div>

</div>

<script>

let started=false;

function start(){

if(started) return;
started=true;

document.getElementById("startScreen").style.display="none";

/* فتح الكتاب */
document.getElementById("book").classList.add("open");

/* تشغيل الموسيقى */
const music=document.getElementById("music");
music.play().catch(()=>{});

/* مؤثرات */
setInterval(confetti,70);
setInterval(firework,1200);

}

/* قصاصات */
function confetti(){

const c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*window.innerWidth+"px";
c.style.background=["#ff66c4","#ffd700","#fff","#00e5ff"][Math.floor(Math.random()*4)];
c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),6000);

}

/* انفجارات */
function firework(){

const x=Math.random()*window.innerWidth;
const y=Math.random()*window.innerHeight*0.6;

for(let i=0;i<30;i++){

const f=document.createElement("div");
f.className="firework";

const angle=Math.random()*2*Math.PI;
const radius=Math.random()*100;

f.style.left=(x+Math.cos(angle)*radius)+"px";
f.style.top=(y+Math.sin(angle)*radius)+"px";

f.style.background=["#ff0000","#ffd700","#fff","#00ffff"][Math.floor(Math.random()*4)];

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

</script>

</body>
</html>
