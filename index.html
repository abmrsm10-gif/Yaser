<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف ملكية 3D</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        overflow: hidden;
        font-family: 'Tahoma', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        /* تغيير الخلفية للبنفسجي الكاشف المتدرج */
        background: linear-gradient(135deg, #f3e5f5, #e1bee7, #ce93d8);
        perspective: 1000px;
    }

    .start-screen {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(74, 20, 140, 0.4); /* بنفسجي داكن شفاف */
        backdrop-filter: blur(8px);
        z-index: 1000;
        transition: 0.5s;
    }

    .start-btn {
        padding: 20px 50px;
        font-size: 24px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        color: white;
        background: linear-gradient(45deg, #9c27b0, #ba68c8);
        box-shadow: 0 10px 20px rgba(156, 39, 176, 0.3);
        font-weight: bold;
        transition: 0.3s;
    }

    .start-btn:hover { transform: scale(1.1); background: #7b1fa2; }

    /* حاوية الـ 3D */
    .card-container {
        width: 90%;
        max-width: 400px;
        transition: transform 0.1s ease-out;
        transform-style: preserve-3d;
        z-index: 10;
        display: none;
    }

    .card {
        background: white;
        border-radius: 25px;
        overflow: hidden;
        border: 6px solid #fff;
        box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 10px 20px rgba(156, 39, 176, 0.2);
        transform: translateZ(50px);
        position: relative;
    }

    .card img {
        width: 100%;
        display: block;
        backface-visibility: hidden;
    }

    /* تأثير اللمعان */
    .card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(125deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%);
        pointer-events: none;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
    }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startApp()">🎉 فتح الدعوة الملكية</button>
</div>

<canvas id="canvas"></canvas>

<div class="card-container" id="container">
    <div class="card" id="card">
        <img src="invite.png" alt="Wedding Invitation">
    </div>
</div>

<audio id="music" loop>
    <source src="wedding.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 7 + 3;
        this.speedX = Math.random() * 12 - 6;
        this.speedY = Math.random() * -15 - 5;
        this.gravity = 0.25;
        this.rotation = Math.random() * 360;
        this.rotationSpeed = Math.random() * 15 - 7.5;
        this.opacity = 1;
    }
    update() {
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        this.opacity -= 0.008;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        // رسم قصاصات زينة
        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 1.5);
        ctx.restore();
    }
}

function createExplosion() {
    // ألوان تتماشى مع الثيم البنفسجي والذهبي
    const colors = ['#8e24aa', '#d81b60', '#ffd700', '#ffffff', '#e1bee7'];
    const x = Math.random() * canvas.width;
    const y = canvas.height + 20;
    for (let i = 0; i < 40; i++) {
        particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.opacity <= 0) particles.splice(i, 1);
    });
    
    if (Math.random() < 0.12) createExplosion();
    requestAnimationFrame(animate);
}

function startApp() {
    document.getElementById('startScreen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('startScreen').style.display = 'none';
        container.style.display = 'block';
        document.getElementById('music').play();
        animate();
    }, 500);
}

// تفاعل الـ 3D مع الماوس
document.addEventListener('mousemove', (e) => {
    let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
    let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
    container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});

// تفاعل الـ 3D مع اللمس للموبايل
document.addEventListener('touchmove', (e) => {
    let touch = e.touches[0];
    let xAxis = (window.innerWidth / 2 - touch.pageX) / 25;
    let yAxis = (window.innerHeight / 2 - touch.pageY) / 25;
    container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});
</script>
</body>
</html>
