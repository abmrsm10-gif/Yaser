<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دعوة زفاف</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
font-family:Tahoma;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6f6,#e0c3fc,#c2e9fb);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* زر البداية */
.start-screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
z-index:20;
background:rgba(0,0,0,0.25);
}

.start-btn{
padding:18px 40px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff66c4,#ffd700);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:.3s;
}

.start-btn:hover{transform:scale(1.1);}

/* البطاقة */
.card{
width:90%;
max-width:430px;
background:rgba(255,255,255,0.95);
border-radius:30px;
text-align:center;
border:5px solid gold;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
overflow:hidden;
z-index:5;
opacity:0;
transform:translateY(60px) scale(.8);
transition:1.2s ease;
}

.card.show{
opacity:1;
transform:translateY(0) scale(1);
}

.card img{
width:100%;
max-height:300px;
object-fit:cover;
}

.content{padding:18px;}

h1{
color:#b8860b;
font-size:36px;
margin-bottom:10px;
animation:fadeText 2s ease forwards;
}

p{
font-size:20px;
color:#444;
margin:10px 0;
opacity:0;
animation:slideText 1.5s ease forwards;
}

p:nth-child(2){animation-delay:.5s;}
p:nth-child(3){animation-delay:1s;}
p:nth-child(4){animation-delay:1.5s;}
p:nth-child(5){animation-delay:2s;}

@keyframes fadeText{
from{opacity:0;transform:scale(.5);}
to{opacity:1;transform:scale(1);}
}

@keyframes slideText{
from{opacity:0;transform:translateX(50px);}
to{opacity:1;transform:translateX(0);}
}

.btn{
display:inline-block;
padding:12px 30px;
background:linear-gradient(to right,#ff66c4,#b8860b);
color:white;
border-radius:50px;
text-decoration:none;
font-size:20px;
margin-top:15px;
}

/* قصاصات */
.confetti{
position:absolute;
width:8px;
height:12px;
animation:fall linear forwards;
z-index:1;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(720deg);
opacity:0;
}
}

/* انفجار */
.firework{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
animation:boom 1s ease-out forwards;
z-index:1;
}

@keyframes boom{
0%{transform:scale(1);}
100%{transform:scale(30);opacity:0;}
}

</style>
</head>

<body>

<!-- شاشة البداية -->
<div class="start-screen" id="startScreen">
<button class="start-btn" onclick="start()">🎉 فتح الدعوة</button>
</div>

<!-- موسيقى -->
<audio id="music" loop>
<source src="wedding.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">

<img src="invite.png">

<div class="content">

<h1>دعوة زفاف</h1>

<p>يسرنا دعوتكم لحضور حفل الزفاف</p>
<p>📅 7 حزيران 2026</p>
<p>🕖 الساعة 7 مساءً</p>
<p>📍 صالة اثينا - مقابل شارع عثمان</p>

<a class="btn" href="https://maps.google.com" target="_blank">عرض الموقع</a>

</div>
</div>

<script>

let started=false;

/* تشغيل كل شيء بعد الضغط */
function start(){

if(started) return;
started=true;

document.getElementById("startScreen").style.display="none";

document.getElementById("card").classList.add("show");

/* تشغيل الموسيقى */
document.getElementById("music").play();

/* تشغيل المؤثرات */
setInterval(createConfetti,60);
setInterval(firework,900);

}

/* قصاصات ورقية */
function createConfetti(){

const c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*window.innerWidth+"px";
c.style.background=[
"#ff66c4","#ffd700","#ffffff","#00e5ff","#c77dff"
][Math.floor(Math.random()*5)];

c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),6000);

}

/* انفجار ألعاب نارية دائرية */
function firework(){

const x=Math.random()*window.innerWidth;
const y=Math.random()*window.innerHeight*0.6;

for(let i=0;i<40;i++){

const f=document.createElement("div");
f.className="firework";

const angle=Math.random()*2*Math.PI;
const radius=Math.random()*120;

f.style.left=(x + Math.cos(angle)*radius)+"px";
f.style.top=(y + Math.sin(angle)*radius)+"px";

f.style.background=[
"#ff0000","#ffd700","#ffffff","#00ffff","#ff66c4"
][Math.floor(Math.random()*5)];

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

</script>

</body>
</html>
