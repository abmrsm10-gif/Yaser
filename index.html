<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>دعوة زفاف - احتفال 3D خفيف</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    font-family: 'Tahoma', 'Segoe UI', 'Amiri', serif;
    height: 100vh;
    background: radial-gradient(circle at 30% 20%, #1e0b36, #0a0319);
    position: relative;
    cursor: pointer;
  }

  /* طبقة الخلفية ثلاثية الأبعاد (خفيفة) */
  .bg-3d {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* شاشة البداية */
  .start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    z-index: 200;
    transition: opacity 0.8s ease;
  }

  .start-btn {
    padding: 16px 42px;
    font-size: 24px;
    font-weight: bold;
    border: none;
    border-radius: 60px;
    background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb88c);
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(255, 80, 120, 0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: inherit;
    letter-spacing: 1px;
  }

  .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 30px rgba(255, 120, 150, 0.8);
  }

  /* بطاقة الدعوة */
  .card {
    position: relative;
    z-index: 20;
    width: 90%;
    max-width: 480px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 45px;
    overflow: hidden;
    text-align: center;
    border: 3px solid #ffd966;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 6px rgba(255, 200, 100, 0.2);
    opacity: 0;
    transform: scale(0.8) translateY(40px);
    transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.2), transform 0.7s cubic-bezier(0.2, 0.9, 0.3, 1.3);
    backdrop-filter: blur(2px);
  }

  .card.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  .card img {
    width: 100%;
    display: block;
    pointer-events: none;
  }

  /* صانع القصاصات المتحركة الخفيفة */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 20px;
    will-change: transform;
    animation: floatFall linear forwards;
  }

  @keyframes floatFall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* وميض انفجار خفيف */
  .flash-effect {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, rgba(255,215,0,0.8), rgba(255,100,150,0));
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9998;
    animation: flashPop 0.5s ease-out forwards;
  }

  @keyframes flashPop {
    0% {
      width: 0px;
      height: 0px;
      opacity: 0.9;
    }
    100% {
      width: 180px;
      height: 180px;
      opacity: 0;
    }
  }

  @media (max-width: 550px) {
    .card { max-width: 92%; }
    .start-btn { font-size: 20px; padding: 12px 32px; }
  }
</style>
</head>
<body>

<div class="bg-3d" id="bg3d"></div>

<div class="start-screen" id="startScreen">
  <button class="start-btn" onclick="startWedding()">🎉 افتح الدعوة 🎉</button>
</div>

<div class="card" id="card">
  <img src="invite.png" alt="دعوة زفاف" onerror="this.src='https://placehold.co/600x800/fffaf0/d4af37?text=دعوة+زفاف+سعيدة';">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="wedding.mp3" type="audio/mpeg">
</audio>

<script>
  (function() {
    // ------------------- نظام قصاصات عنيف لكن خفيف (optimized) -------------------
    let activeParticles = [];
    let musicStarted = false;
    let sceneActive = false;
    let explosionInterval = null;
    let bgInterval = null;

    // عناصر رقمية: قلوب، ورود، قصاصات ملونة
    const iconsList = ['❤️', '💖', '🌸', '🌹', '🌼', '⭐', '✨', '💗', '🌺', '💐', '🎉', '❤️‍🔥'];
    const colorsList = ['#ff4d6d', '#ffb347', '#f4d03f', '#e84393', '#9b59b6', '#2ecc71', '#ff6b6b', '#ff9f4a'];
    
    // انفجار واحد: يولد عدد قليل من الجسيمات (خفيف وسريع)
    function createExplosion(x, y, intensity = 1.0) {
      if (!sceneActive) return;
      
      // عدد الجسيمات بين 12 و 28 فقط - خفيف جداً
      let count = Math.floor(12 + (intensity * 14));
      count = Math.min(count, 32);
      
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 9 * (intensity * 0.8);
        const vx = Math.cos(angle) * speed * (Math.random() * 0.8 + 0.6);
        const vy = Math.sin(angle) * speed * (Math.random() * 0.8 + 0.5);
        
        // تحديد نوع العنصر: قلب، وردة، قصاصة
        let type = 'confetti';
        const r = Math.random();
        if (r < 0.35) type = 'heart';
        else if (r < 0.6) type = 'flower';
        else type = 'paper';
        
        let icon = '';
        let color = '';
        let isEmoji = true;
        
        if (type === 'heart') {
          icon = ['❤️', '💖', '💗', '💓'][Math.floor(Math.random()*4)];
          color = '#ff4d6d';
        } else if (type === 'flower') {
          icon = ['🌸', '🌹', '🌼', '🌺', '🌷'][Math.floor(Math.random()*5)];
          color = '#ff8c69';
        } else {
          // قصاصة ورق مستطيل
          isEmoji = false;
          color = colorsList[Math.floor(Math.random() * colorsList.length)];
        }
        
        const element = document.createElement('div');
        element.classList.add('confetti-piece');
        
        if (isEmoji) {
          element.textContent = icon;
          element.style.fontSize = (12 + Math.random() * 15) + 'px';
          element.style.fontFamily = '"Segoe UI Emoji", "Apple Color Emoji", sans-serif';
          element.style.color = color;
        } else {
          // قصاصة ورقية مستطيلة
          element.style.width = (8 + Math.random() * 12) + 'px';
          element.style.height = (6 + Math.random() * 10) + 'px';
          element.style.backgroundColor = color;
          element.style.borderRadius = '2px';
          element.style.boxShadow = '0 1px 2px rgba(0,0,0,0.2)';
          element.textContent = '';
        }
        
        element.style.left = x + 'px';
        element.style.top = y + 'px';
        element.style.position = 'fixed';
        element.style.zIndex = '10000';
        
        // إضافة خصائص الحركة عبر CSS custom properties
        const duration = 0.8 + Math.random() * 1.6;
        const rotStart = Math.random() * 360;
        const rotEnd = rotStart + (Math.random() * 720 - 360);
        
        element.style.animation = `floatFall ${duration}s linear forwards`;
        element.style.transform = `rotate(${rotStart}deg)`;
        
        document.body.appendChild(element);
        
        // تخزين البيانات للتحكم لاحقاً (إزالة بعد انتهاء الأنيميشن)
        const removeHandler = () => {
          if (element && element.remove) element.remove();
        };
        element.addEventListener('animationend', removeHandler, { once: true });
        
        // دفع الجسيمات لمصفوفة إضافية (لإدارة حالات الطوارئ)
        activeParticles.push(element);
        
        // تنظيف الصفيف عند إزالة العناصر
        setTimeout(() => {
          const index = activeParticles.indexOf(element);
          if (index > -1) activeParticles.splice(index, 1);
        }, duration * 1000 + 100);
        
        // حركة جانبية باستخدام قوة الانفجار (تطبيق translate إضافي عبر style)
        const moveX = vx;
        const moveY = vy;
        let startTime = null;
        
        function animateMove(timestamp) {
          if (!startTime) startTime = timestamp;
          const elapsed = timestamp - startTime;
          const progress = Math.min(elapsed / (duration * 1000), 1);
          const dx = moveX * progress * 35;
          const dy = moveY * progress * 35;
          if (element) {
            element.style.transform = `translate(${dx}px, ${dy}px) rotate(${rotStart + (rotEnd - rotStart) * progress}deg)`;
            if (progress >= 0.98 && element.style.opacity !== '0') {
              element.style.opacity = '0';
            }
          }
          if (progress < 1 && element && element.parentNode) {
            requestAnimationFrame(animateMove);
          }
        }
        requestAnimationFrame(animateMove);
      }
      
      // إضافة تأثير وميض سريع (لإحساس انفجار 3D)
      const flash = document.createElement('div');
      flash.classList.add('flash-effect');
      flash.style.left = x + 'px';
      flash.style.top = y + 'px';
      flash.style.transform = 'translate(-50%, -50%)';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 500);
    }
    
    // انفجار خلفية عشوائي متكرر لكن خفيف
    function randomExplosion() {
      if (!sceneActive) return;
      const randX = Math.random() * window.innerWidth;
      const randY = Math.random() * window.innerHeight * 0.8 + 50;
      const intensity = 0.6 + Math.random() * 1.0;
      createExplosion(randX, randY, intensity);
    }
    
    // انفجار احتفالي كبير حول البطاقة
    function grandCelebration() {
      if (!sceneActive) return;
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2.2;
      // 3 انفجارات متتالية سريعة
      createExplosion(centerX, centerY, 1.4);
      setTimeout(() => {
        if(sceneActive) createExplosion(centerX - 70, centerY + 40, 1.2);
      }, 80);
      setTimeout(() => {
        if(sceneActive) createExplosion(centerX + 80, centerY - 20, 1.2);
      }, 160);
      setTimeout(() => {
        if(sceneActive) createExplosion(centerX + 20, centerY + 70, 1.1);
      }, 250);
    }
    
    // خلفية ثلاثية الأبعاد متحركة (خفيفة جداً)
    function init3DBackground() {
      const bgDiv = document.getElementById('bg3d');
      let tick = 0;
      function animateBackground() {
        if (!bgDiv) return;
        tick += 0.008;
        const grad1 = `radial-gradient(circle at ${30 + Math.sin(tick) * 8}% ${40 + Math.cos(tick * 0.7) * 5}%, #2b164a, #0c0520)`;
        const grad2 = `radial-gradient(circle at ${70 + Math.cos(tick * 0.5) * 12}% ${60 + Math.sin(tick * 0.9) * 8}%, #3a1c61, #03010f)`;
        bgDiv.style.background = `${grad1}, ${grad2}`;
        bgDiv.style.backgroundBlendMode = 'overlay';
        requestAnimationFrame(animateBackground);
      }
      animateBackground();
    }
    
    // بدء المؤثرات والبطاقة
    window.startWedding = function() {
      if (window._weddingStarted) return;
      window._weddingStarted = true;
      
      // إخفاء شاشة البداية
      const startDiv = document.getElementById('startScreen');
      startDiv.style.opacity = '0';
      setTimeout(() => {
        startDiv.style.display = 'none';
      }, 600);
      
      // تشغيل الموسيقى
      const audio = document.getElementById('bgMusic');
      audio.volume = 0.5;
      audio.play().catch(e => console.log("موسيقى تحتاج تفاعل اضافي"));
      
      // إظهار بطاقة الدعوة
      const card = document.getElementById('card');
      card.classList.add('show');
      
      // تفعيل المشهد
      sceneActive = true;
      
      // أول انفجار كبير احتفالي
      setTimeout(() => {
        grandCelebration();
      }, 150);
      
      // انفجارات متقطعة ممتعة ولكن خفيفة (غير مثقلة)
      if (explosionInterval) clearInterval(explosionInterval);
      explosionInterval = setInterval(() => {
        if (sceneActive) {
          randomExplosion();
          // أحياناً انفجارين بشكل سريع
          if (Math.random() > 0.7) {
            setTimeout(() => randomExplosion(), 180);
          }
        } else {
          clearInterval(explosionInterval);
        }
      }, 1100);
      
      // انفجارات إضافية في أركان الشاشة لجمال 3D
      let cornerInterval = setInterval(() => {
        if (!sceneActive) {
          clearInterval(cornerInterval);
          return;
        }
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (Math.random() > 0.6) {
          createExplosion(w * 0.15, h * 0.2, 0.7);
        }
        if (Math.random() > 0.6) {
          createExplosion(w * 0.85, h * 0.75, 0.7);
        }
      }, 2700);
      
      window._cleanupIntervals = [explosionInterval, cornerInterval];
    };
    
    // تنظيف عند مغادرة الصفحة (اختياري)
    window.addEventListener('beforeunload', () => {
      if (window._cleanupIntervals) {
        window._cleanupIntervals.forEach(i => clearInterval(i));
      }
    });
    
    // إنشاء خلفية ثلاثية الأبعاد فورية
    init3DBackground();
    
    // عمل قصاصات وردية خفيفة جداً في البداية لجذب العين دون ثقل
    setTimeout(() => {
      if (!window._weddingStarted) {
        for (let i = 0; i < 12; i++) {
          setTimeout(() => {
            if (!window._weddingStarted) {
              const randX = Math.random() * window.innerWidth;
              const randY = Math.random() * window.innerHeight;
              createExplosion(randX, randY, 0.45);
            }
          }, i * 300);
        }
      }
    }, 300);
  })();
</script>
</body>
</html>
