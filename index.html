<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دعوة زفاف رومانسية</title>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Tahoma, sans-serif;
      background: linear-gradient(to bottom, #fff8f8, #fff0f5);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .card {
      width: 90%;
      max-width: 520px;
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      text-align: center;
      border: 5px solid #d4af37;
      animation: zoomIn 1.5s ease;
      position: relative;
      z-index: 10;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .content {
      padding: 25px;
    }

    h1 {
      color: #b8860b;
      margin-bottom: 15px;
      font-size: 38px;
    }

    p {
      font-size: 22px;
      color: #444;
      margin: 12px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 35px;
      background: linear-gradient(to right, #d4af37, #b8860b);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 22px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.08);
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .fall {
      position: absolute;
      top: -50px;
      font-size: 30px;
      animation: fall linear infinite;
      z-index: 1;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style></head>
<body>  <div class="card">
    <img src="invite.jpg" alt="دعوة زفاف"><div class="content">
  <h1>دعوة زفاف</h1>
  <p>يسرنا دعوتكم لحضور حفل الزفاف</p>
  <p>📅 7 حزيران 2026</p>
  <p>🕖 الساعة 7 مساءً</p>
  <p>📍 صالة اشنا - مقابل شارع عثمان</p>

  <a class="btn" href="https://maps.google.com" target="_blank">
    عرض الموقع
  </a>
</div>

  </div>  <script>
    const symbols = ['🌹', '❤️', '💖', '🌸'];

    function createFall() {
      const item = document.createElement('div');
      item.classList.add('fall');
      item.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

      item.style.left = Math.random() * window.innerWidth + 'px';
      item.style.animationDuration = (Math.random() * 5 + 5) + 's';
      item.style.fontSize = (Math.random() * 20 + 20) + 'px';

      document.body.appendChild(item);

      setTimeout(() => {
        item.remove();
      }, 10000);
    }

    setInterval(createFall, 300);
  </script></body>
</html>
