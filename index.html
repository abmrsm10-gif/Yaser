<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Royal Wedding Invitation</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        overflow: hidden;
        font-family: 'Tahoma', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%);
        perspective: 2000px;
    }

    .start-screen {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(45, 0, 85, 0.7);
        backdrop-filter: blur(15px);
        z-index: 1000;
        transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .start-btn {
        padding: 25px 60px;
        font-size: 26px;
        border: 2px solid rgba(255, 215, 0, 0.5);
        border-radius: 60px;
        cursor: pointer;
        color: white;
        background: linear-gradient(45deg, #4a148c, #9c27b0);
        box-shadow: 0 0 30px rgba(156, 39, 176, 0.5), inset 0 0 15px rgba(255, 215, 0, 0.3);
        font-weight: bold;
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        white-space: nowrap;
    }

    .start-btn:hover { 
        transform: scale(1.1) rotate(1deg); 
        box-shadow: 0 0 50px rgba(255, 215, 0, 0.6);
        background: linear-gradient(45deg, #6a1b9a, #ba68c8);
    }

    /* حاوية الـ VIP - الانبثاق من بعيد */
    .card-container {
        width: 85%;
        max-width: 330px;
        transition: transform 0.15s ease-out;
        transform-style: preserve-3d;
        z-index: 10;
        display: none;
        opacity: 0;
    }

    .card-container.reveal {
        display: block;
        animation: vipEntrance 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    /* هالة ذهبية خلف البطاقة */
    .reveal::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 130%;
        height: 130%;
        background: radial-gradient(circle, rgba(255,215,0,0.35) 0%, transparent 70%);
        transform: translate(-50%, -50%) translateZ(-100px);
        filter: blur(30px);
        animation: glowPulse 3s infinite alternate;
    }

    .card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        border: 6px solid #fff;
        box-shadow: 0 50px 100px rgba(0,0,0,0.3);
        transform: translateZ(50px);
        position: relative;
    }

    .card img {
        width: 100%;
        max-height: 70vh;
        object-fit: contain;
        display: block;
        backface-visibility: hidden;
    }

    /* تأثير اللمعان الفائق */
    .card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.7) 50%, transparent 65%);
        pointer-events: none;
        animation: superShine 4s infinite linear;
    }

    @keyframes vipEntrance {
        0% { 
            transform: translateZ(-2500px) rotateY(180deg) rotateX(45deg); 
            opacity: 0; 
            filter: blur(30px);
        }
        50% {
            opacity: 1;
            filter: blur(8px);
        }
        100% { 
            transform: translateZ(0) rotateY(0) rotateX(0); 
            opacity: 1; 
            filter: blur(0);
        }
    }

    @keyframes glowPulse {
        from { transform: translate(-50%, -50%) translateZ(-100px) scale(0.8); opacity: 0.4; }
        to { transform: translate(-50%, -50%) translateZ(-100px) scale(1.3); opacity: 0.7; }
    }

    @keyframes superShine {
        0% { transform: translateX(-200%) skewX(-30deg); }
        100% { transform: translateX(200%) skewX(-30deg); }
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
    }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startApp()">✨✨ فتح الدعوة الخاصة بك ✨✨</button>
</div>

<canvas id="canvas"></canvas>

<div class="card-container" id="container">
    <div class="card" id="card">
        <img src="invite.png" alt="Wedding Invitation">
    </div>
</div>

<audio id="music" loop>
    <source src="wedding.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * 8 + 4;
        this.speedX = Math.random() * 14 - 7;
        this.speedY = Math.random() * -18 - 8;
        this.gravity = 0.2;
        this.rotation = Math.random() * 360;
        this.rotationSpeed = Math.random() * 20 - 10;
        this.opacity = 1;
    }
    update() {
        this.speedY += this.gravity;
        this.x += this.speedX; this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        this.opacity -= 0.006;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        ctx.restore();
    }
}

function createExplosion() {
    const colors = ['#ffd700', '#ffffff', '#9c27b0', '#e1bee7', '#ffeb3b'];
    const x = Math.random() * canvas.width;
    const y = canvas.height + 20;
    for (let i = 0; i < 50; i++) {
        particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        p.update(); p.draw();
        if (p.opacity <= 0) particles.splice(i, 1);
    });
    if (Math.random() < 0.15) createExplosion();
    requestAnimationFrame(animate);
}

function startApp() {
    const screen = document.getElementById('startScreen');
    screen.style.opacity = '0';
    
    setTimeout(() => {
        screen.style.display = 'none';
        container.style.display = 'block';
        setTimeout(() => {
            container.classList.add('reveal');
        }, 100);

        const music = document.getElementById('music');
        music.play().catch(() => {});
        animate();
    }, 1000);
}

// تحكم 3D
document.addEventListener('mousemove', (e) => {
    if(container.classList.contains('reveal')) {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 15;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 15;
        container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    }
});

document.addEventListener('touchmove', (e) => {
    let touch = e.touches[0];
    let xAxis = (window.innerWidth / 2 - touch.pageX) / 15;
    let yAxis = (window.innerHeight / 2 - touch.pageY) / 15;
    container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});
</script>
</body>
</html>
