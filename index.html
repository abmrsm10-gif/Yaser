<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Royal Wedding Invitation</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        overflow: hidden;
        font-family: 'Tahoma', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%);
        perspective: 2000px;
    }

    .start-screen {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(45, 0, 85, 0.7);
        backdrop-filter: blur(15px);
        z-index: 1000;
        transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .start-btn {
        padding: 25px 60px;
        font-size: 26px;
        border: 2px solid rgba(255, 215, 0, 0.5);
        border-radius: 60px;
        cursor: pointer;
        color: white;
        background: linear-gradient(45deg, #4a148c, #9c27b0);
        box-shadow: 0 0 30px rgba(156, 39, 176, 0.5), inset 0 0 15px rgba(255, 215, 0, 0.3);
        font-weight: bold;
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        white-space: nowrap;
    }

    /* حاوية الأزرار السفلية */
    .action-buttons {
        position: fixed;
        bottom: 30px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 0 20px;
        z-index: 20;
        opacity: 0;
        transition: 1.5s ease-in-out;
        pointer-events: none;
    }

    .action-buttons.show {
        opacity: 1;
        pointer-events: auto;
    }

    .btn-vip {
        padding: 12px 20px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        color: white;
        font-size: 14px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        transition: 0.3s;
        border: 1px solid rgba(255, 215, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-vip:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4); }

    .btn-share { background: linear-gradient(45deg, #6a1b9a, #8e24aa); width: 30%; }
    .btn-confirm { background: linear-gradient(45deg, #d4af37, #b8860b); width: 35%; border-color: #fff; font-size: 16px; }
    .btn-open { background: linear-gradient(45deg, #4a148c, #6a1b9a); width: 30%; }

    /* حاوية الـ VIP - الانبثاق من بعيد */
    .card-container {
        width: 85%;
        max-width: 330px;
        transition: transform 0.15s ease-out;
        transform-style: preserve-3d;
        z-index: 10;
        display: none;
        opacity: 0;
    }

    .card-container.reveal {
        display: block;
        animation: vipEntrance 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    .card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        border: 6px solid #fff;
        box-shadow: 0 50px 100px rgba(0,0,0,0.3);
        transform: translateZ(50px);
        position: relative;
    }

    .card img {
        width: 100%;
        max-height: 65vh; /* تقليل الطول قليلاً لترك مساحة للأزرار */
        object-fit: contain;
        display: block;
        backface-visibility: hidden;
    }

    .card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.7) 50%, transparent 65%);
        pointer-events: none;
        animation: superShine 4s infinite linear;
    }

    @keyframes vipEntrance {
        0% { transform: translateZ(-2500px) rotateY(180deg) rotateX(45deg); opacity: 0; filter: blur(30px); }
        100% { transform: translateZ(0) rotateY(0) rotateX(0); opacity: 1; filter: blur(0); }
    }

    @keyframes superShine {
        0% { transform: translateX(-200%) skewX(-30deg); }
        100% { transform: translateX(200%) skewX(-30deg); }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startApp()">✨✨ فتح الدعوة الخاصة بك ✨✨</button>
</div>

<div class="action-buttons" id="actionBtns">
    <a href="https://yaser-gamma.vercel.app/" class="btn-vip btn-share">🔗 مشاركة</a>
    <a href="#" class="btn-vip btn-confirm">تأكيد الحضور</a>
    <a href="https://share.google/Pwq968VXRnfbJ79Qh" class="btn-vip btn-open">🌐 فتح الموقع</a>
</div>

<canvas id="canvas"></canvas>

<div class="card-container" id="container">
    <div class="card" id="card">
        <img src="invite.png" alt="Wedding Invitation">
    </div>
</div>

<audio id="music" loop>
    <source src="wedding.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');
const actionBtns = document.getElementById('actionBtns');
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * 8 + 4;
        this.speedX = Math.random() * 14 - 7;
        this.speedY = Math.random() * -18 - 8;
        this.gravity = 0.2;
        this.opacity = 1;
    }
    update() {
        this.speedY += this.gravity;
        this.x += this.speedX; this.y += this.speedY;
        this.opacity -= 0.006;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.restore();
    }
}

function createExplosion() {
    const colors = ['#ffd700', '#ffffff', '#9c27b0', '#ffeb3b'];
    const x = Math.random() * canvas.width;
    const y = canvas.height + 20;
    for (let i = 0; i < 30; i++) {
        particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        p.update(); p.draw();
        if (p.opacity <= 0) particles.splice(i, 1);
    });
    if (Math.random() < 0.1) createExplosion();
    requestAnimationFrame(animate);
}

function startApp() {
    document.getElementById('startScreen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('startScreen').style.display = 'none';
        container.style.display = 'block';
        setTimeout(() => {
            container.classList.add('reveal');
            // إظهار الأزرار بعد بدء ظهور البطاقة
            setTimeout(() => {
                actionBtns.classList.add('show');
            }, 1000);
        }, 100);
        document.getElementById('music').play().catch(() => {});
        animate();
    }, 1000);
}

document.addEventListener('mousemove', (e) => {
    if(container.classList.contains('reveal')) {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 20;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 20;
        container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    }
});
</script>
</body>
</html>
