<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف ملكية 3D</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        overflow: hidden;
        font-family: 'Tahoma', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #2c3e50, #000); /* خلفية داكنة لإبراز الانفجارات */
        perspective: 1000px; /* لزوم تأثير الـ 3D */
    }

    .start-screen {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0,0,0,0.8);
        z-index: 1000;
        transition: 0.5s;
    }

    .start-btn {
        padding: 20px 50px;
        font-size: 24px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        color: white;
        background: linear-gradient(45deg, #d4af37, #f9f295, #d4af37);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        font-weight: bold;
        transition: 0.3s;
    }

    .start-btn:hover { transform: scale(1.1); }

    /* حاوية الـ 3D */
    .card-container {
        width: 90%;
        max-width: 400px;
        transition: transform 0.1s ease-out;
        transform-style: preserve-3d;
        z-index: 10;
        display: none; /* تظهر بعد الضغط */
    }

    .card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        border: 8px solid #d4af37;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        transform: translateZ(50px); /* رفع البطاقة عن المستوى */
        position: relative;
    }

    .card img {
        width: 100%;
        display: block;
        backface-visibility: hidden;
    }

    /* طبقة لمعان فوق الصورة */
    .card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(125deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
        pointer-events: none;
    }

    /* تأثير الانفجارات */
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startApp()">✨ فتح الدعوة الملكية ✨</button>
</div>

<canvas id="canvas"></canvas>

<div class="card-container" id="container">
    <div class="card" id="card">
        <img src="invite.png" alt="Wedding Invitation">
    </div>
</div>

<audio id="music" loop>
    <source src="wedding.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');
const card = document.getElementById('card');
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 8 + 4;
        this.speedX = Math.random() * 10 - 5;
        this.speedY = Math.random() * 10 - 15;
        this.gravity = 0.2;
        this.rotation = Math.random() * 360;
        this.rotationSpeed = Math.random() * 10 - 5;
        this.opacity = 1;
    }
    update() {
        this.speedY += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        this.opacity -= 0.01;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        // رسم قصاصات مستطيلة
        ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        ctx.restore();
    }
}

function createExplosion() {
    const colors = ['#ff66c4', '#ffd700', '#ffffff', '#e0c3fc', '#00f2ff'];
    const x = Math.random() * canvas.width;
    const y = canvas.height + 50;
    for (let i = 0; i < 50; i++) {
        particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.opacity <= 0) particles.splice(i, 1);
    });
    
    if (Math.random() < 0.1) createExplosion();
    requestAnimationFrame(animate);
}

function startApp() {
    document.getElementById('startScreen').style.display = 'none';
    container.style.display = 'block';
    document.getElementById('music').play();
    animate();
}

// تأثير تحريك البطاقة 3D مع الماوس
document.addEventListener('mousemove', (e) => {
    let xAxis = (window.innerWidth / 2 - e.pageX) / 20;
    let yAxis = (window.innerHeight / 2 - e.pageY) / 20;
    container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});

// دعم الجوال
document.addEventListener('touchmove', (e) => {
    let touch = e.touches[0];
    let xAxis = (window.innerWidth / 2 - touch.pageX) / 20;
    let yAxis = (window.innerHeight / 2 - touch.pageY) / 20;
    container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});

</script>
</body>
</html>
