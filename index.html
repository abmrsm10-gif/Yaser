<!DOCTYPE html>  
<html lang="ar" dir="rtl">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>دعوة زفاف</title>  
<style>  
  
*{margin:0;padding:0;box-sizing:border-box;}  
  
body{  
overflow:hidden;  
font-family:Tahoma;  
height:100vh;  
display:flex;  
justify-content:center;  
align-items:center;  
background:linear-gradient(135deg,#ffd6f6,#e0c3fc,#c2e9fb);  
background-size:400% 400%;  
animation:bgMove 12s ease infinite;  
}  
  
@keyframes bgMove{  
0%{background-position:0% 50%;}  
50%{background-position:100% 50%;}  
100%{background-position:0% 50%;}  
}  
  
.start-screen{  
position:fixed;  
inset:0;  
display:flex;  
justify-content:center;  
align-items:center;  
background:rgba(0,0,0,0.3);  
z-index:100;  
}  
  
.start-btn{  
padding:18px 40px;  
font-size:22px;  
border:none;  
border-radius:50px;  
cursor:pointer;  
color:white;  
background:linear-gradient(45deg,#ff66c4,#ffd700);  
}  
  
.card{  
width:90%;  
max-width:430px;  
background:white;  
border-radius:30px;  
overflow:hidden;  
text-align:center;  
border:5px solid gold;  
box-shadow:0 10px 40px rgba(0,0,0,0.25);  
opacity:0;  
transform:scale(.8);  
transition:1s;  
position:relative;  
z-index:10;  
}  
  
.card.show{  
opacity:1;  
transform:scale(1);  
}  
  
.card img{  
width:100%;  
display:block;  
}  
  
/* قصاصات الأعراس */  
.confetti{  
position:absolute;  
width:10px;  
height:15px;  
opacity:0.9;  
animation:fall linear forwards;  
border-radius:2px;  
}  
  
@keyframes fall{  
0%{  
transform:translateY(0) rotate(0deg);  
opacity:1;  
}  
100%{  
transform:translateY(120vh) rotate(720deg);  
opacity:0;  
}  
}  
  
/* تأثير الانفجار / القنبلة */  
.firework{  
position:absolute;  
width:6px;  
height:6px;  
border-radius:50%;  
animation:boom 1.2s ease-out forwards;  
}  
  
@keyframes boom{  
0% {  
transform:scale(1);  
opacity:1;  
}  
50% {  
transform:scale(30);  
opacity:0.8;  
}  
100% {  
transform:scale(40);  
opacity:0;  
}  
}  
  
/* شرارات الانفجار */  
.spark {  
position:absolute;  
width:3px;  
height:20px;  
transform-origin:bottom center;  
animation:sparkFly 1s ease-out forwards;  
border-radius:3px;  
}  
  
@keyframes sparkFly {  
0% {  
transform:translateY(0) scale(1);  
opacity:1;  
}  
100% {  
transform:translateY(-120px) rotate(var(--angle)) scale(0);  
opacity:0;  
}  
}  
  
</style>  
</head>  
<body>  

<div class="start-screen" id="startScreen">  
<button class="start-btn" onclick="start()">🎉 فتح الدعوة</button>  
</div>  

<audio id="music" loop>  
<source src="wedding.mp3" type="audio/mpeg">  
  

<div class="card" id="card">  
<img src="invite.png">  
</div>  

<script>  
  
let started = false;  
const colors = ['#ff66c4', '#ffd700', '#ff4081', '#00e5ff', '#76ff03', '#ff9800', '#e040fb'];

function start(){  
if(started) return;  
started = true;  

// إخفاء شاشة البداية
document.getElementById('startScreen').style.display = 'none';  

// إظهار البطاقة
document.getElementById('card').classList.add('show');  

// تشغيل الموسيقى
document.getElementById('music').play().catch(()=>{});  

// تشغيل تأثيرات الانفجارات والقصاصات
startFireworksAndConfetti();  
}  

// دالة إنشاء الانفجارات والقصاصات
function startFireworksAndConfetti(){
// تكرار الانفجارات كل فترة
setInterval(() => {
createFirework(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.7);
createConfettiBurst(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.7, 80);
}, 1500);

// قصاصات مستمرة تتساقط من الأعلى
setInterval(() => {
for(let i=0; i<15; i++){
createConfetti(Math.random() * window.innerWidth, -20);
}
}, 300);
}

// إنشاء تأثير انفجار (قنبلة)
function createFirework(x, y){
const firework = document.createElement('div');
firework.classList.add('firework');
firework.style.left = x + 'px';
firework.style.top = y + 'px';
firework.style.background = colors[Math.floor(Math.random() * colors.length)];
document.body.appendChild(firework);

// إنشاء شرارات متجهة للخارج
for(let i=0; i<16; i++){
const spark = document.createElement('div');
spark.classList.add('spark');
spark.style.left = x + 'px';
spark.style.top = y + 'px';
spark.style.background = colors[Math.floor(Math.random() * colors.length)];
spark.style.setProperty('--angle', (i * 22.5) + 'deg');
document.body.appendChild(spark);

// حذف الشرارة بعد انتهاء الحركة
setTimeout(() => spark.remove(), 1000);
}

// حذف الانفجار بعد انتهاء الحركة
setTimeout(() => firework.remove(), 1200);
}

// إنشاء قصاصة ورقية واحدة
function createConfetti(x, y){
const confetti = document.createElement('div');
confetti.classList.add('confetti');
confetti.style.left = x + 'px';
confetti.style.top = y + 'px';
confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
confetti.style.width = `${Math.random() * 8 + 6}px`;
confetti.style.height = `${Math.random() * 10 + 8}px`;
confetti.style.animationDuration = `${Math.random() * 3 + 2}s`;
document.body.appendChild(confetti);

setTimeout(() => confetti.remove(), 5000);
}

// انفجار قصاصات في نقطة محددة
function createConfettiBurst(x, y, count){
for(let i=0; i<count; i++){
const confetti = document.createElement('div');
confetti.classList.add('confetti');
confetti.style.left = x + 'px';
confetti.style.top = y + 'px';
confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
confetti.style.width = `${Math.random() * 8 + 6}px`;
confetti.style.height = `${Math.random() * 10 + 8}px`;
confetti.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
const angle = Math.random() * Math.PI * 2;
const distance = Math.random() * 150 + 50;
confetti.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
confetti.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
confetti.style.animation = 'burstFly 1.5s ease-out forwards, fall 4s linear forwards';
document.body.appendChild(confetti);

setTimeout(() => confetti.remove(), 4000);
}
}

// إضافة حركة انفجار للقصاصات
const style = document.createElement('style');
style.textContent = `
@keyframes burstFly {
0% { transform: translate(0,0) rotate(0deg); }
100% { transform: translate(var(--tx), var(--ty)) rotate(360deg); }
}
`;
document.head.appendChild(style);

</script>  

</body>  
</html>
