<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Royal Wedding Invitation</title>
<style>
    /* تحسين الأداء العام */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
        overflow: hidden;
        font-family: 'Tahoma', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ce93d8; /* لون ثابت كقاعدة لتحسين الأداء */
        background: radial-gradient(circle, #f3e5f5 0%, #ce93d8 100%);
        perspective: 1500px;
    }

    .start-screen {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(45, 0, 85, 0.75);
        backdrop-filter: blur(10px);
        z-index: 1000;
        transition: 0.5s;
    }

    .start-btn {
        padding: 20px 50px;
        font-size: 24px;
        border: 2px solid gold;
        border-radius: 50px;
        cursor: pointer;
        color: white;
        background: #7b1fa2;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        font-weight: bold;
        transition: 0.3s;
    }

    /* حاوية البطاقة - تم تسريع الأنيميشن */
    .card-container {
        width: 85%;
        max-width: 320px;
        transform-style: preserve-3d;
        z-index: 10;
        display: none;
        opacity: 0;
        will-change: transform, opacity; /* تنبيه المتصفح لتحسين الأداء */
    }

    .card-container.reveal {
        display: block;
        animation: fastEntrance 1.2s cubic-bezier(0.2, 0, 0.2, 1) forwards;
    }

    .card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        border: 5px solid #fff;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        position: relative;
    }

    .card img {
        width: 100%;
        max-height: 70vh;
        object-fit: contain;
        display: block;
    }

    /* تأثير لمعان خفيف وغير مكلف برمجياً */
    .card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
        animation: shine 3s infinite linear;
    }

    /* أنيميشن دخول سريع وسلس */
    @keyframes fastEntrance {
        0% { transform: translateZ(-1000px) scale(0.5); opacity: 0; }
        100% { transform: translateZ(0) scale(1); opacity: 1; }
    }

    @keyframes shine {
        0% { transform: translateX(-150%); }
        100% { transform: translateX(150%); }
    }

    canvas {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
    }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startApp()">✨✨ فتح الدعوة الخاصة بك ✨✨</button>
</div>

<canvas id="canvas"></canvas>

<div class="card-container" id="container">
    <div class="card" id="card">
        <img src="invite.png" alt="Wedding Invitation">
    </div>
</div>

<audio id="music" loop>
    <source src="wedding.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: true }); // تحسين أداء الكانفاس
const container = document.getElementById('container');
let particles = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 5 + 2;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * -12 - 5;
        this.opacity = 1;
        this.color = ['#ffd700', '#ffffff', '#e1bee7'][Math.floor(Math.random() * 3)];
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.speedY += 0.3; // Gravity
        this.opacity -= 0.015;
    }
    draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].opacity <= 0) {
            particles.splice(i, 1);
            i--;
        }
    }
    if (particles.length < 50 && Math.random() < 0.1) {
        const x = Math.random() * canvas.width;
        for(let j=0; j<20; j++) particles.push(new Particle(x, canvas.height));
    }
    requestAnimationFrame(animate);
}

function startApp() {
    document.getElementById('startScreen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('startScreen').style.display = 'none';
        container.style.display = 'block';
        setTimeout(() => container.classList.add('reveal'), 50);
        document.getElementById('music').play().catch(() => {});
        animate();
    }, 400);
}

// تفاعل 3D بسيط وسريع
document.addEventListener('mousemove', (e) => {
    if(container.style.display === 'block') {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    }
});
</script>
</body>
</html>
